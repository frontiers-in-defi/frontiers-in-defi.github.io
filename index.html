<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Frontiers in DeFi</title>
  <style>
    :root{
      --bg1:#0b1320; --bg2:#0f2a4d;
      --card:rgba(255,255,255,.10);
      --border:rgba(255,255,255,.18);
      --text:#fff; --muted:rgba(255,255,255,.78);
    }
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background: linear-gradient(120deg,var(--bg1),var(--bg2));
      color:var(--text);
    }
    main{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding:56px 16px;
      text-align:center;
    }
    h1{
      margin:0 0 10px;
      font-weight:550;
      font-size:clamp(34px,5vw,58px);
      letter-spacing:.2px;
    }
    p{
      margin:0 0 26px;
      max-width:900px;
      color:var(--muted);
      line-height:1.5;
      font-size:clamp(16px,2vw,18px);
    }
    .years{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      justify-content:center;
      margin:10px 0 26px;
    }
    .years a{
      display:inline-block;
      padding:12px 18px;
      border-radius:12px;
      background:var(--card);
      border:1px solid var(--border);
      color:var(--text);
      text-decoration:none;
      font-weight:650;
    }
    .years a:hover{ background:rgba(255,255,255,.16); }
    footer{
      margin-top:18px;
      font-size:14px;
      color:rgba(255,255,255,.70);
    }
    footer a{ color:rgba(255,255,255,.88); }
  </style>
</head>
<body>
  <main>
    <h1>Frontiers in DeFi</h1>
    <p>Annual interdisciplinary workshop series on decentralized finance (DeFi).</p>

    <div class="years">
      <a href="/Berlin2026/">2026</a>
      <a href="https://events.htw-berlin.de/forschung/frontiers-in-defi-2025/">2025</a>
      <a href="https://csh.ac.at/events/frontiers-in-defi/">2024</a>
      <a href="https://www.zhaw.ch/en/sml/institutes-centres/iwa/translate-to-english-veranstaltungen/translate-to-english-frontiers-in-decentralized-finance#c215728">2023</a>
    </div>

    <!-- Optional: organizers (delete this block if you want even simpler)
    <p style="margin-top:6px; font-size:14px; color:rgba(255,255,255,.70);">
      Organizers: HTW Berlin and partners
    </p>
    -->

    <footer>
      Contact: <a href="mailto:frontiers-defi@htw-berlin.de">frontiers-defi@htw-berlin.de</a>
    </footer>
  </main>
</body>
</html>
